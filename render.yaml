services:
  - type: web
    name: slastream-relay
    runtime: node
    rootDir: relay
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SLA_ESCROW_ADDRESS
        sync: false
      - key: RELAY_STARKNET_PRIVATE_KEY
        sync: false
      - key: RELAY_STARKNET_ACCOUNT_ADDRESS
        sync: false
      - key: STARKNET_RPC_URL
        sync: false
      - key: STARKNET_RPC_URL_BACKUP
        sync: false
      - key: PDP_VERIFIER_ADDRESS
        sync: false
      - key: FEVM_RPC_URL
        sync: false
      - key: FEVM_RPC_URL_BACKUP
        sync: false
      - key: FEVM_POLL_INTERVAL_MS
        sync: false
      - key: FEVM_LOOKBACK_BLOCKS
        sync: false
      - key: LIT_DEPLOYER_PRIVATE_KEY
        sync: false
      - key: PKP_PUBLIC_KEY_X
        sync: false
      - key: PKP_PUBLIC_KEY_Y
        sync: false
      - key: LIT_ACTION_IPFS_CID
        sync: false
      - key: LIT_PKP_TOKEN_ID
        sync: false
      - key: LIT_PKP_PUBLIC_KEY
        sync: false
      - key: LIT_NETWORK
        sync: false
      - key: TRACKED_DEALS_CONFIG
        value: ""
